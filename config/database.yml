default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("PGUSER") { "postgres" } %>
  password: <%= ENV.fetch("PGPASSWORD") { "postgres" } %>
  host: <%= ENV.fetch("PGHOST") { "localhost" } %>
  port: <%= ENV.fetch("PGPORT") { 5432 } %>

development:
  <<: *default
  database: restaurante_development

test:
  <<: *default
  database: restaurante
  username: postgres
  password: deus
  host: localhost
  port: 5432

production:
  primary:
    <<: *default
    database: restaurante_production
  cache:
    <<: *default
    database: restaurante_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: restaurante_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: restaurante_cable
    migrations_paths: db/cable_migrate
